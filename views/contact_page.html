<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ tòa soạn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <div class="header-container">
            <div class="logo">
                <span>WEBSIDE</span>
            </div>
            <nav class="nav">
                <a href="#" class="nav-home">🏠</a>
                <a href="#">Công nghệ</a>
                <a href="#">Thể thao</a>
                <a href="#">Chính trị</a>
                <a href="#">Kinh doanh</a>
                <a href="#">Sức khỏe</a>
            </nav>
        </div>
    </header>

    <main class="page-shell">
        <section class="article-body contact-body">
            <h1 class="article-title">Liên hệ tòa soạn</h1>
            <form class="contact-form">
                <div class="form-group">
                    <label for="fullname">Họ tên</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Nhập họ tên của bạn">
                </div>

                <div class="form-row">
                    <div class="form-group half-width">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Nhập email của bạn">
                    </div>
                    <div class="form-group half-width">
                        <label for="recipient">Gửi tới</label>
                        <select id="recipient" name="recipient">
                            <option>Chọn bộ phận</option>
                            <option>Biên tập viên</option>
                            <option>Quảng cáo</option>
                            <option>Hỗ trợ kỹ thuật</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="subject">Tiêu đề</label>
                    <input type="text" id="subject" name="subject" placeholder="Tiêu đề liên hệ">
                </div>

                <div class="form-group">
                    <label for="message">Nội dung</label>
                    <textarea id="message" name="message" rows="10" placeholder="Nhập nội dung cần gửi"></textarea>
                </div>

                <button type="submit" class="submit-button">Gửi liên hệ</button>
            </form>
        </section>

        <aside class="sidebar contact-sidebar">
            <div class="sidebar-card">
                <h2>Thông tin về VnExpress</h2>
                <p><strong>Tòa soạn</strong></p>
                <p>Tầng 10, Tòa A FPT Tower, số 10 Phạm Văn Bạch, phường Cầu Giấy, Hà Nội</p>
                <p>Đường dây nóng: 083.888.0123</p>
                <p>Điện thoại: 024 7300 8899 - máy lẻ 4500</p>
                <p>Fax: 024 3795 9948</p>
            </div>
        </aside>
    </main>
</body>
</html>
