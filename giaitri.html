<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIẢI TRÍ VÒNG QUANH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header-main">
        <div class="header-left">
            <i class="fas fa-user"></i>
            <span class="brand-name">GIẢI TRÍ VÒNG QUANH</span>
        </div>
        <div class="header-right">
            <div class="search-box">
                <input type="text" placeholder="Tìm kiếm...">
                <i class="fas fa-search"></i>
            </div>
        </div>
    </header>

    <nav class="main-navbar">
        <ul>
            <li><a href="#">GIỚI SAO</a></li>
            <li><a href="#">SÁCH</a></li>
            <li><a href="#">PHIM</a></li>
            <li><a href="#">NHẠC</a></li>
        </ul>
    </nav>

    <div class="news-container">
        <!-- Cột trái: 65% -->
        <main class="main-content">
            <article class="news-card overlay-item">
                <img src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?w=1000&h=700&fit=crop" alt="Tin chính">
                <div class="overlay-info">
                    <h2>Sự kiện giải trí nổi bật nhất trong tuần qua</h2>
                </div>
            </article>
        </main>

        <!-- Cột phải: 35% -->
        <aside class="side-content">
            <article class="news-card overlay-item small-overlay">
                <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?w=500&h=350&fit=crop" alt="Tin phụ 1">
                <div class="overlay-info">
                    <h3>Khám phá hậu trường phim mới</h3>
                </div>
            </article>

            <article class="news-card standard-item">
                <img src="https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=500&h=300&fit=crop" alt="Tin phụ 2">
                <h3 class="underlined-title">Top những cuốn sách bán chạy nhất tháng</h3>
            </article>
        </aside>
    </div>

</body>
</html>
